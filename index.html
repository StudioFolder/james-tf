<!DOCTYPE html>

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="James Taylor-Foster — curator, editor, and writer">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<script>
  function blink() {
    const eyes = document.querySelectorAll('.eye');
    eyes.forEach(e => e.classList.add('blinking'));
    setTimeout(() => {
      eyes.forEach(e => e.classList.remove('blinking'));
    }, 120);
    const next = 2000 + Math.random() * 4000;
    setTimeout(blink, next);
  }
  setTimeout(blink, 1000 + Math.random() * 2000);
</script>

<body>
  <div class="layout">
    <aside class="col-left">
      <h1 class="name"><span class="face"><span class="eye left-eye">◕</span><span class="mouth">‿</span><span class="eye right-eye">◕</span></span>&nbsp;&nbsp;&nbsp;James Taylor-Foster</h1>

      </footer>
    </aside>
    <main class="col-right">
    </main>
  </div>
</body>
